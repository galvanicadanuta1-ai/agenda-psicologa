<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gestão</title>
    <style>
        /* Cole o seu CSS completo aqui dentro das tags de estilo */
        /* Exemplo: */
        :root { --cor-menu: #2c3e50; --cor-principal: #1abc9c; }
        /* ... resto do seu código CSS ... */
    </style>
</head>
<body>

<div class="container-app">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-brand"><h1>CLÍNICA GESTÃO</h1></div>
        <div class="sidebar-menu">
            <button>Dashboard</button>
            <button>Pacientes</button>
        </div>
    </aside>

    <main class="conteudo-principal">
        <!-- Filtros -->
        <section class="topo-sistema">
            <div class="form-group-row">
                <div class="form-group">
                    <label>Data Início</label>
                    <input type="date" id="dataInicio">
                </div>
                <div class="form-group">
                    <label>Data Fim</label>
                    <input type="date" id="dataFim">
                </div>
                <div class="form-group" style="justify-content: flex-end;">
                    <label>&nbsp;</label>
                    <button class="btn-salvar" style="padding: 10px 20px;">Buscar</button>
                </div>
            </div>
        </section>

        <!-- Grade -->
        <div class="grade-agenda">
            <div class="coluna-dia">
                <h3>Hoje</h3>
                <div class="slots-agendamentos">
                    <div class="card-compromisso">
                        <button class="btn-tres-pontos-agenda" onclick="abrirModal()">⋮</button>
                        <span class="card-paciente-nome">João Silva</span>
                        <span class="card-paciente-hora">14:00</span>
                        <div style="margin-top: 5px;">
                            <label style="font-size: 10px;"><input type="checkbox"> R$ Pago</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Modal -->
<div class="modal-popup" id="modalEdicao" style="display: none;">
    <div class="modal-popup-content">
        <h3>Editar Agendamento</h3>
        <div class="form-group">
            <label>Valor (R$)</label>
            <input type="number" placeholder="0,00">
        </div>
        <div class="form-group">
            <label><input type="checkbox"> Status: Pago</label>
        </div>
        <div class="form-acoes">
            <button class="btn-cancelar" onclick="fecharModal()">Fechar</button>
            <button class="btn-salvar">Salvar Alterações</button>
        </div>
    </div>
</div>

<script>
    // Lógica básica para o modal
    function abrirModal() { document.getElementById('modalEdicao').style.display = 'flex'; }
    function fecharModal() { document.getElementById('modalEdicao').style.display = 'none'; }
</script>

</body>
</html>
