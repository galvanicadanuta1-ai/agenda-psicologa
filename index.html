<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Agenda Integrada</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="sidebar-menu">
        <div class="sidebar-brand">
            <img id="logoClinicaDisplay" src="" alt="Logo da Clinica">
            <div id="nomeClinicaTexto" class="sidebar-brand-title">Clinica Integrada</div>
            <div id="subtituloClinicaTexto" class="sidebar-brand-subtitle">Gestao de Saude</div>
        </div>
        <button onclick="mostrarTela('dashboard')">Agenda</button>
        <button onclick="mostrarTela('pacientes')">Pacientes</button>
        <button onclick="mostrarTela('configuracoes')">Configuracoes</button>
    </div>

    <div class="main-wrapper">
        <div class="header-secao">
            <h1 id="tituloSecao">Agenda</h1>
        </div>

        <div id="dashboard" class="tela" style="display: block;">
            <div class="cards-indicadores">
                <div class="card-ind">
                    <h3>Pacientes Ativos</h3>
                    <p id="totalAtivos">0</p>
                </div>
                <div class="card-ind">
                    <h3>Pacientes Inativos</h3>
                    <p id="totalInativos">0</p>
                </div>
            </div>
            <div id="grade-agenda-container"></div>
        </div>

        <div id="pacientes" class="tela">
            <div class="barra-acoes">
                <button onclick="acionarMenuNovoPaciente()" class="btn-principal">Novo Paciente</button>
            </div>
            <div id="listaPacientes" class="grid-pacientes"></div>
        </div>

        <div id="novoPaciente" class="tela">
            <div class="form-container">
                <form id="formPaciente">
                    <h3>Informacoes do Prontuario</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nome Completo</label>
                            <input type="text" id="nome" required>
                        </div>
                        <div class="form-group">
                            <label>CPF</label>
                            <input type="text" id="cpf">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>WhatsApp / Telefone</label>
                            <input type="text" id="telefone">
                        </div>
                        <div class="form-group">
                            <label>E-mail</label>
                            <input type="email" id="email">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Data de Nascimento</label>
                            <input type="date" id="dataNascimento">
                        </div>
                        <div class="form-group">
                            <label>Responsavel Legal (Se menor)</label>
                            <input type="text" id="responsavel">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Endereco Residencial</label>
                        <input type="text" id="endereco">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Vinculo / Status</label>
                            <select id="statusVinculo">
                                <option value="Ativo">Ativo</option>
                                <option value="Inativo">Inativo (Arquivado)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Observacoes Gerais</label>
                            <textarea id="observacoes" rows="2"></textarea>
                        </div>
                    </div>

                    <h3 class="titulo-bloco-form">Plano Clinico Recorrente</h3>
