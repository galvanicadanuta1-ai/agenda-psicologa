<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Agenda e Prontuários - Clínica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-wrapper">
        
        <header class="dashboard-header">
            <h1>Agenda</h1>
        </header>

        <div class="metricas-cards-container">
            <div class="card-metrica">
                <span class="card-metrica-titulo">PACIENTES ATIVOS</span>
                <span class="card-metrica-valor" id="qtd-ativos">2</span>
            </div>
            <div class="card-metrica">
                <span class="card-metrica-titulo">PACIENTES INATIVOS</span>
                <span class="card-metrica-valor" id="qtd-inativos">0</span>
            </div>
        </div>

        <div class="tela-perfil-prontuario-container">
            
            <div class="formulario-lado-esquerdo">
                <form id="formProntuarioPaciente" onsubmit="event.preventDefault();">
                    
                    <div class="form-group-full">
                        <label for="enderecoResidencial">Endereço Residencial</label>
                        <input type="text" id="enderecoResidencial" name="enderecoResidencial" placeholder="Digite o endereço completo">
                    </div>

                    <div class="form-row-dois-campos">
                        <div class="form-group">
                            <label for="vinculoStatus">Vínculo / Status</label>
                            <select id="vinculoStatus" name="vinculoStatus">
                                <option value="Ativo" selected>Ativo</option>
                                <option value="Inativo">Inativo</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="observacoesGerais">Observações Gerais</label>
                            <textarea id="observacoesGerais" name="observacoesGerais" rows="3" placeholder="Anotações gerais sobre o paciente..."></textarea>
                        </div>
                    </div>

                    <h2 class="section-title-formulario">Plano Clínico Recorrente</h2>

                    <div class="form-row-dois-campos">
                        <div class="form-group">
                            <label for="dataInicial">Data Inicial do Plano</label>
                            <input type="date" id="dataInicial" name="dataInicial" value="2026-06-25" onchange="atualizarSimulacaoAgenda()">
                        </div>
                        <div class="form-group">
                            <label for="diaSemana">Dia da Semana</label>
                            <select id="diaSemana" name="diaSemana" onchange="atualizarSimulacaoAgenda()">
                                <option value="Segunda">Segunda</option>
                                <option value="Terça">Terça</option>
                                <option value="Quarta">Quarta</option>
                                <option value="Quinta" selected>Quinta</option>
                                <option value="Sexta">Sexta</option>
                                <option value="Sábado">Sábado</option>
                                <option value="Domingo">Domingo</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row-dois-campos">
                        <div class="form-group">
                            <label for="frequencia">Frequência</label>
                            <select id="frequencia" name="frequencia" onchange="atualizarSimulacaoAgenda()">
                                <option value="Semanal" selected>Semanal</option>
                                <option value="Quinzenal">Quinzenal</option>
                                <option value="Mensal">Mensal</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="horario">Horário Fixo</label>
                            <input type="time" id="horario" name="horario" value="20:00" onchange="atualizarSimulacaoAgenda()">
                        </div>
                    </div>

                    <div class="form-row-tres-campos">
                        <div class="form-group">
                            <label for="modalidade">Modalidade</label>
                            <select id="modalidade" name="modalidade" onchange="atualizarSimulacaoAgenda()">
                                <option value="Online" selected>Online</option>
                                <option value="Presencial">Presencial</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="valor">Valor da Sessão (R$)</label>
                            <input type="number" id="valor" name="valor" value="200" step="0.01" onchange="atualizarSimulacaoAgenda()">
                        </div>
                        <div class="form-group">
                            <label for="cicloCobranca">Ciclo de Cobrança</label>
                            <select id="cicloCobranca" name="cicloCobranca">
                                <option value="Semanal">Semanal</option>
                                <option value="Quinzenal">Quinzenal</option>
                                <option value="Mensal" selected>Mensal</option>
                            </select>
                        </div>
                    </div>

                    <div class="container-botoes-acoes">
                        <button type="button" id="btnSalvarPaciente" class="btn-principal" onclick="executarAcaoSalvar()">
                            Salvar Prontuário
                        </button>
                        <button type="button" id="btnExcluirPacienteForm" class="btn-perigo-remover" onclick="executarAcaoRemover()">
                            Remover
                        </button>
                    </div>

                </form>
            </div>

            <div id="sidebar-agenda-paciente" class="sidebar-historico-agenda">
                <div class="box-resumo-plano" id="info-plano-resumo">
                    </div>
                <div class="lista-scroll-sessoes" id="lista-proximas-sessoes">
                    </div>
            </div>

        </div>
    </div>

    <div id="modalEditorAgenda" class="modal-sobreposto-agenda">
        <div class="modal-conteudo-agenda">
            <h3>Editar Sessão Específica</h3>
            <input type="hidden" id="modalEdicaoDataISO">
            <div class="form-group-modal">
                <label for="modalEdicaoHora">Hora:</label>
                <input type="time" id="modalEdicaoHora">
            </div>
            <div class="form-group-modal">
                <label for="modalEdicaoModalidade">Modalidade:</label>
                <select id="modalEdicaoModalidade">
                    <option value="Online">Online</option>
                    <option value="Presencial">Presencial</option>
                </select>
            </div>
            <div class="form-group-modal">
                <label for="modalEdicaoValor">Valor (R$):</label>
                <input type="number" id="modalEdicaoValor" step="0.01">
            </div>
            <div class="form-group-modal">
                <label for="modalEdicaoStatus">Status:</label>
                <select id="modalEdicaoStatus">
                    <option value="Agendado">Agendado</option>
                    <option value="Realizado">Realizado</option>
                    <option value="Faltou">Faltou</option>
                    <option value="Cancelado">Cancelado</option>
                </select>
            </div>
            <div class="modal-botoes-linha">
                <button type="button" class="btn-modal-salvar" onclick="salvarAlteracaoDiretaAgenda()">Aplicar</button>
                <button type="button" class="btn-modal-fechar" onclick="fecharModalEditorAgenda()">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Inicialização simulada para demonstração em tela
        window.addEventListener('DOMContentLoaded', () => {
            renderizarSidebarCalendarioPaciente("paciente-abc-123");
        });
    </script>
</body>
</html>
