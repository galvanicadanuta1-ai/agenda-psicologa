<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão - Agenda & Clientes</title>
    
    <!-- Biblioteca do Supabase v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Link para o arquivo de estilos externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="grid-principal">
        
        <!-- PAINEL PRINCIPAL DA AGENDA -->
        <div class="card-painel">
            <h2>Agenda de Atendimentos</h2>
            
            <div class="semana-header">Segunda-Feira</div>
            <div id="container-segunda">
                <div class="quadro-paciente">
                    <div class="quadro-paciente-info">
                        <span class="paciente-nome">Carlos Eduardo Silva</span>
                        <span class="paciente-meta">14:00 - Presencial - R$ 150,00</span>
                    </div>
                    <button class="btn-reset" onclick="abrirEdicao(1, '2026-06-22')">Editar</button>
                </div>
            </div>

            <div class="semana-header">Terça-Feira</div>
            <div id="container-terca">
                <div class="quadro-paciente">
                    <div class="quadro-paciente-info">
                        <span class="paciente-nome">Mariana Costa</span>
                        <span class="paciente-meta">09:30 - Online - R$ 160,00</span>
                    </div>
                    <button class="btn-reset" onclick="abrirEdicao(2, '2026-06-23')">Editar</button>
                </div>
            </div>
        </div>
        
        <!-- PAINEL DE CADASTRO / EDIÇÃO DO CLIENTE -->
        <div class="card-painel">
            <h2>Cadastro do Cliente</h2>
            <form id="form-cliente" onsubmit="event.preventDefault();">
                
                <div class="form-group">
                    <label for="txt-nome">Nome do Paciente</label>
                    <input type="text" id="txt-nome" class="form-control" placeholder="Nome completo">
                </div>

                <div class="form-group">
                    <label for="txt-plano">Plano de Atendimento</label>
                    <input type="text" id="txt-plano" class="form-control" placeholder="Ex: 2x por semana">
                </div>

                <div class="form-group">
                    <label for="txt-dia-semana">Dia da Semana</label>
                    <input type="text" id="txt-dia-semana" class="form-control" placeholder="Calculado automaticamente" readonly>
                </div>

                <div class="form-group">
                    <label for="sel-cobranca">Forma de Cobrança</label>
                    <select id="sel-cobranca" class="form-control">
                        <option value="">Selecione uma opção</option>
                        <option value="Pagamento Antecipado">Pagamento Antecipado</option>
                        <option value="Mensal">Mensal</option>
                        <option value="Por Sessão">Por Sessão</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="txt-observacoes">Observações</label>
                    <textarea id="txt-observacoes" class="form-control" placeholder="Anotações importantes do histórico..."></textarea>
                </div>

                <div class="btn-container">
                    <button type="button" class="btn-reset" id="btn-limpar">Reset</button>
                    <button type="button" class="btn-salvar" onclick="dispararFluxoSafeguard()">Salvar Alterações</button>
                </div>
            </form>
        </div>

    </div>
</div>

<!-- Link para o motor JavaScript externo -->
<script src="app.js"></script>
</body>
</html>
